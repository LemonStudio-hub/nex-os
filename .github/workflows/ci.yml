# CI/CD Pipeline for web-code
#
# Runs on every push and pull request to main:
# 1. Rust lint (clippy + rustfmt), tests (unit + integration), WASM build
# 2. Frontend build (type-check + Vite build)
# 3. Deploy to Cloudflare Pages (main branch push only)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Rust tests and WASM build
  # ──────────────────────────────────────────────────────────────────────
  rust:
    name: Rust Tests & WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy lints
        run: cargo clippy -- -D warnings

      - name: Run unit tests
        run: cargo test --verbose --target x86_64-unknown-linux-gnu

      - name: Build WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install wasm-bindgen-cli
        run: |
          VERSION=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | grep 'version =' | head -1 | sed 's/.*"\(.*\)"/\1/')
          cargo install wasm-bindgen-cli --version "$VERSION"

      - name: Generate JS bindings
        run: |
          wasm-bindgen --target web \
            --out-dir pkg \
            target/wasm32-unknown-unknown/release/web_code.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # Frontend build
  # ──────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/

      - name: Type-check frontend
        working-directory: web
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # Deploy to Cloudflare Pages (main branch only)
  # ──────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install wasm-bindgen-cli
        run: |
          VERSION=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | grep 'version =' | head -1 | sed 's/.*"\(.*\)"/\1/')
          cargo install wasm-bindgen-cli --version "$VERSION"

      - name: Generate JS bindings
        run: |
          wasm-bindgen --target web \
            --out-dir pkg \
            target/wasm32-unknown-unknown/release/web_code.wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist/ --project-name=web-code --commit-dirty=true
